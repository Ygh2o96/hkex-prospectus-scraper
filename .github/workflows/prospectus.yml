name: HKEX Prospectus Scraper (Playwright)

on:
  workflow_dispatch:
    inputs:
      years:
        description: 'Years to scrape (space-separated)'
        required: true
        default: '2026'
        type: string
      stock:
        description: 'Single stock code (optional, for testing)'
        required: false
        type: string
      date_margin:
        description: 'Days around prospectus date to search'
        required: false
        default: '7'
        type: string
      dry_run:
        description: 'Dry run (no downloads)'
        required: false
        default: false
        type: boolean
      filter:
        description: 'Download filter: all / smart (skip <1MB) / top-n (largest N only)'
        required: false
        default: 'smart'
        type: choice
        options:
          - all
          - smart
          - top-n
      min_size_mb:
        description: 'Min file size in MB (for smart filter)'
        required: false
        default: '1.0'
        type: string
      top_n:
        description: 'Keep N largest files per stock (for top-n filter)'
        required: false
        default: '3'
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests openpyxl playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state/
          key: hkex-prospectus-state-${{ github.ref_name }}
          restore-keys: hkex-prospectus-state-

      - name: Run prospectus scraper
        env:
          DOWNLOAD_DIR: downloads/prospectuses
          STATE_FILE: state/prospectus_downloaded.json
          RATE_LIMIT_SECONDS: '2.0'
        run: |
          ARGS="--years ${{ github.event.inputs.years }}"
          if [ -n "${{ github.event.inputs.stock }}" ]; then
            ARGS="$ARGS --stock ${{ github.event.inputs.stock }}"
          fi
          ARGS="$ARGS --date-margin ${{ github.event.inputs.date_margin || '7' }}"
          ARGS="$ARGS --filter ${{ github.event.inputs.filter || 'smart' }}"
          ARGS="$ARGS --min-size-mb ${{ github.event.inputs.min_size_mb || '1.0' }}"
          ARGS="$ARGS --top-n ${{ github.event.inputs.top_n || '3' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: python prospectus_scraper.py $ARGS"
          python prospectus_scraper.py $ARGS

      - name: Upload prospectuses
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: hkex-prospectuses-${{ github.run_number }}
          path: downloads/prospectuses/
          retention-days: 90
          if-no-files-found: ignore

      - name: Commit state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update prospectus state [$(date -u +%Y-%m-%d)]"
          git push
